context.properties = {
  # Force the global clock rate to the hardware's native 48kHz
  default.clock.rate = 48000

  # Allow only 48kHz and multiples to ensure no low-quality 44.1kHz resampling
  default.clock.allowed-rates = [ 48000 96000 192000 ]

  # Force highest resampling quality (10 is max, 4 is default)
  resample.quality = 14
}

